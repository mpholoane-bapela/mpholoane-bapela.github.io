# Site settings
lang: en
timezone: Africa/Johannesburg

# Jekyll configuration
title: Incomplete Developer
tagline: Learning C# & .NET in public
description: >-
  A blog about C# & .NET development, tech tutorials, and personal projects.
  Because we're all works in progress.

url: "https://mpholoane-bapela.github.io"
baseurl: ""

github:
  username: mpholoane-bapela

# Social media
social:
  name: Mpholoane Bapela
  email: # your-email@example.com (optional)
  links:
    - https://github.com/mpholoane-bapela
    - https://linkedin.com/in/your-username  # UPDATE THIS
    - https://youtube.com/@your-channel      # UPDATE THIS
    - https://upwork.com/freelancers/~your-id # UPDATE THIS

# Site verification (optional)
webmaster_verifications:
  google: # your-verification-code
  bing: # your-verification-code

# Analytics (optional)
google_analytics:
  id: # your-GA-ID

# Avatar - using your uploaded photo!
avatar: /assets/img/avatar.png

# Theme settings
theme_mode: # [light | dark]

# CDN endpoint for media resources
cdn: ""

# The avatar on sidebar, support local or CORS resources
# img_cdn: ""

# Boolean type, the global switch for TOC in posts.
toc: true

comments:
  active: # giscus, disqus, utterances (optional - configure later)

# Page views
pageviews:
  provider: # google, goatcounter, umami, matomo (optional)

# Prefer color scheme setting
prefer_color_scheme: # [light | dark | auto]

# The end of `jekyll-seo-tag` settings

# Web Analytics Settings
analytics:
  google:
    id: # fill in your Google Analytics ID

# Page views
pageviews:
  provider: # now only supports 'goatcounter'

# Permalink
permalink: /posts/:title/

# Pagination
paginate: 10

# Build settings
markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Collections
collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# Exclude from processing
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - rollup.config.js
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# Theme
theme: jekyll-theme-chirpy
